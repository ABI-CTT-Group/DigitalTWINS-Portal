<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DigitalTWINS">
  <defs>
    <linearGradient id="m-tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1a28"/>
      <stop offset="1" stop-color="#06101a"/>
    </linearGradient>
    <radialGradient id="m-aurora" cx="0.3" cy="0.24" r="0.9">
      <stop offset="0" stop-color="#1f5f74" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#0c1a28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m-cyan" x1="120" y1="150" x2="320" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8deff6"/>
      <stop offset="1" stop-color="#3fb6d6"/>
    </linearGradient>
    <linearGradient id="m-mint" x1="200" y1="150" x2="400" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86e7b0"/>
      <stop offset="1" stop-color="#3fb589"/>
    </linearGradient>
    <linearGradient id="m-core" x1="216" y1="216" x2="296" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ff0f7"/>
      <stop offset="1" stop-color="#8fe9b6"/>
    </linearGradient>
    <radialGradient id="m-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#bdf4f7" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#bdf4f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background; the platform applies its own mask -->
  <rect width="512" height="512" fill="url(#m-tile)"/>
  <rect width="512" height="512" fill="url(#m-aurora)"/>

  <!-- mark scaled to ~0.6 around center so it survives the maskable safe-zone crop -->
  <g transform="translate(256 256) scale(0.6) translate(-256 -256)">
    <circle cx="192" cy="256" r="104" fill="none" stroke="url(#m-cyan)" stroke-width="32"/>
    <circle cx="320" cy="256" r="104" fill="none" stroke="url(#m-mint)" stroke-width="32"/>
    <circle cx="256" cy="256" r="80" fill="url(#m-glow)" opacity="0.6"/>
    <circle cx="256" cy="256" r="37" fill="url(#m-core)"/>
    <circle cx="192" cy="107" r="16" fill="#8deff6"/>
    <circle cx="320" cy="405" r="16" fill="#86e7b0"/>
  </g>
</svg>
