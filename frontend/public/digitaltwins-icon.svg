<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DigitalTWINS">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1a28"/>
      <stop offset="1" stop-color="#06101a"/>
    </linearGradient>
    <radialGradient id="aurora" cx="0.28" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#1f5f74" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#0c1a28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="i-cyan" x1="120" y1="150" x2="320" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8deff6"/>
      <stop offset="1" stop-color="#3fb6d6"/>
    </linearGradient>
    <linearGradient id="i-mint" x1="200" y1="150" x2="400" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86e7b0"/>
      <stop offset="1" stop-color="#3fb589"/>
    </linearGradient>
    <linearGradient id="i-core" x1="216" y1="216" x2="296" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ff0f7"/>
      <stop offset="1" stop-color="#8fe9b6"/>
    </linearGradient>
    <radialGradient id="i-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#bdf4f7" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#bdf4f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect width="512" height="512" rx="112" fill="url(#aurora)"/>
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#5fd6e8" stroke-opacity="0.16" stroke-width="2"/>

  <!-- twin rings -->
  <circle cx="192" cy="256" r="104" fill="none" stroke="url(#i-cyan)" stroke-width="32"/>
  <circle cx="320" cy="256" r="104" fill="none" stroke="url(#i-mint)" stroke-width="32"/>

  <!-- synchronized live core -->
  <circle cx="256" cy="256" r="80" fill="url(#i-glow)" opacity="0.6"/>
  <circle cx="256" cy="256" r="37" fill="url(#i-core)"/>

  <!-- orbiting data nodes -->
  <circle cx="192" cy="107" r="16" fill="#8deff6"/>
  <circle cx="320" cy="405" r="16" fill="#86e7b0"/>
</svg>
