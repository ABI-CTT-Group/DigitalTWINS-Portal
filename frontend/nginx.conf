# WebSocket upgrade mapping (shared by all plugin proxies)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # SPA Routing Fallback Plan
    location / {
        try_files $uri /index.html;
    }

    # Static File Caching
    location /assets/ {
        expires 1y;
    }

    # Proxy API requests to portal-backend
    location /api/ {
        proxy_pass http://portal-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamically loaded plugin route configs (generated at deploy time)
    include /etc/nginx/conf.d/plugins/*.conf;
}
