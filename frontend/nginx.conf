# Redirect all standard HTTP traffic to HTTPS
server {
    listen 80;
    server_name test.digitaltwins.auckland.ac.nz; # Replace with your actual domain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name test.digitaltwins.auckland.ac.nz; # Replace with your actual domain

    # Point to the certs you mounted in docker-compose.yml
    ssl_certificate /etc/nginx/certs/test.digitaltwins.auckland.ac.nz.crt; 
    ssl_certificate_key /etc/nginx/certs/test.digitaltwins.auckland.ac.nz.key;
    
    # Recommended security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Serve the React/Vue/Node frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Route API calls internally to avoid Mixed Content blocks
    location /api/ {
        # 'portal-backend' is the internal Docker DNS name
        proxy_pass http://portal-backend:8000/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ... your existing SSL and /api/ config ...

    # Route /seek requests to the SEEK container
    location /seek/ {
        # 'seek' is the container name, 3000 is its internal port
        proxy_pass http://seek:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # This helps Rails know it's being accessed via HTTPS
        proxy_set_header X-Forwarded-Ssl on;
    }
}