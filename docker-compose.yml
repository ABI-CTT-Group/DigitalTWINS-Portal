services:
  portal-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_PATH=/data/plugin_registry.db
      - DATASET_DIR_TOOL=/portal_workspace/tools
      - DATASET_DIR_MEASUREMENT=/portal_workspace/measurements
      - DATASET_DIR_WORKFLOW=/portal_workspace/workflows
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SERVER_SECRET_KEY:-minioadmin}
      - MINIO_PORT=${MINIO_PORT:-8004}
      # Pass-through vars consumed by PLUGIN compose files, not by this backend.
      # PluginDeployer shells out to `docker compose` from inside this container
      # with os.environ as the interpolation source, and compose looks for a .env
      # in the plugin's own project dir — never in clinical-dashboard/.env. So a
      # `${VAR}` in any plugin compose resolves against THIS block, and a missing
      # name degrades silently to the plugin's `:-` default rather than erroring.
      # These names are the plugin-facing contract; keep them even though the
      # backend's own code reads the MINIO_ACCESS_KEY/MINIO_SECRET_KEY above.
      #
      # Corollary: every name in this block occupies a slot in the interpolation
      # namespace of every third-party plugin's compose file. SSL below is already
      # a bare, generic word — don't add more of them (HOST, PORT, DEBUG, ENV...)
      # or a plugin author's unrelated ${VAR} will silently resolve to ours.
      - MINIO_SERVER_ACCESS_KEY=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_SERVER_SECRET_KEY=${MINIO_SERVER_SECRET_KEY:-minioadmin}
      - PROJECT_NAME=${PROJECT_NAME:-digitaltwins-platform}
      # Public scheme of the portal — decides whether generated URLs (workflow
      # metadata, MinIO presigned links) say http:// or https://. The key is SSL
      # because that is what every .env has always shipped; the backend used to
      # read USE_SSL, which nothing ever set, so the flag was permanently false.
      - SSL=${SSL:-false}
      - FHIR_ENDPOINT=${FHIR_ENDPOINT:-hapi-fhir:8080/fhir}
      - DIGITALTWINS_API_BASE_URL=${DIGITALTWINS_API_BASE_URL:-http://digitaltwins-api}
      - DIGITALTWINS_API_PORT=${DIGITALTWINS_API_PORT:-8000}
      - PORTAL_BACKEND_HOST=${PORTAL_BACKEND_HOST:-localhost}
      - PORTAL_KEYCLOAK_BASE_URL=${PORTAL_KEYCLOAK_BASE_URL:-https://130.216.216.243:8009}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-digitaltwins}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-api}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-xxxxxx}
      - KEYCLOAK_VERIFY_SSL=${KEYCLOAK_VERIFY_SSL:-false}
      - KEYCLOAK_CA_CERT=${KEYCLOAK_CA_CERT:-}
      # Nginx plugin config (shared volume with portal-frontend)
      - NGINX_PLUGINS_CONF_DIR=/nginx-plugins-conf
      - NGINX_CONTAINER_NAME=${PROJECT_NAME}-portal-frontend
      # Upload ceiling — read by /api/measurement and surfaced to nginx +
      # the frontend dropzone via /api/measurement/config so all three
      # layers move together when an operator edits .env and restarts.
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20480}
    volumes:
      - portal_datasets:/app/data
      # /portal_workspace holds tool + workflow + measurement staging in
      # three subdirs (tools/, workflows/, measurements/), keyed off the
      # DATASET_DIR_* env vars above. It was a Windows host bind mount, but
      # Docker Desktop's gRPC-FUSE hangs under SPARC dataset creation for
      # large plugins (thousands of small files — VolView/itk pipelines).
      # Switched to a named volume so SPARC writes stay inside the Linux VM's
      # ext4. The source of truth for datasets is MinIO; the local copy here
      # is just build staging + cleanup target on plugin/workflow delete.
      # NOTE: measurement/ is no longer host-bind-mounted, so dropping SPARC
      # test datasets from Windows now needs `docker cp` into the volume.
      - portal_workspace:/portal_workspace
      - plugin_database:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx_plugin_configs:/nginx-plugins-conf
    restart: unless-stopped
    # Give the lifespan shutdown hook time to batch-kill all plugin backends
    # before Docker SIGKILLs portal-backend itself.
    stop_grace_period: 60s
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - digitaltwins-platform
    depends_on:
      - minio

  portal-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_KEYCLOAK_URL=${PORTAL_KEYCLOAK_BASE_URL}
        - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM:-digitaltwins}
        - VITE_KEYCLOAK_CLIENT_ID=portal-frontend
    container_name: ${PROJECT_NAME}-portal-frontend
    # Host ports are published by docker-compose.override.yml, which only the
    # standalone dev stack loads. Under the platform, 80/443 belong to the
    # gateway (digitaltwins-platform/services/nginx) and publishing them here too
    # would just collide. The platform reaches this container by service name on
    # the shared network.
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      # Must match portal-backend's MAX_UPLOAD_MB. Rendered into
      # client_max_body_size on the upload-source nginx location.
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20480}
      # Per-chunk body cap for measurement chunked-upload PUTs. Keep >= backend
      # MEASUREMENT_PART_SIZE_BYTES (default 8 MiB); 16m default has headroom.
      - MAX_PART_SIZE_MB=${MAX_PART_SIZE_MB:-16}
      # The official nginx image's entrypoint runs envsubst over
      # /etc/nginx/templates/*.template, and by default treats *every* defined
      # environment variable as substitutable. Narrow it to the three the
      # template actually uses, or nginx's own $host / $scheme / $connection_upgrade
      # risk being replaced with empty strings. ($$ escapes compose interpolation.)
      - NGINX_ENVSUBST_FILTER=^(BACKEND_PORT|MAX_UPLOAD_MB|MAX_PART_SIZE_MB)$$
    volumes:
      - nginx_plugin_configs:/etc/nginx/conf.d/plugins
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - digitaltwins-platform
    depends_on:
      - portal-backend
  
  minio:
    image: quay.io/minio/minio:latest
    networks:
      - digitaltwins-platform
    volumes:
      - 'minio_data:/data'
    environment:
      # MinIO authenticates against MINIO_ROOT_USER/PASSWORD and nothing else.
      # These were hardcoded to minioadmin while portal-backend derived its
      # credentials from MINIO_SERVER_*, so filling those in .env used to hand the
      # backend a credential this server had never heard of (403 on every bucket).
      # Both sides now read the same two .env keys.
      - MINIO_ROOT_USER=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SERVER_SECRET_KEY:-minioadmin}
      # Tells the Console its public base URL so all static/API/redirect paths get the /minio prefix.
      # Filled from .env (see .env.template). HTTP default is used only when unset.
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL:-http://localhost/minio}
    command: server /data --console-address ":9001" --address ":9000"
  
  hapi-fhir:
    image: hapiproject/hapi:latest
    restart: on-failure
    ports:
      - "8006:8080"
    networks:
      - digitaltwins-platform
    volumes:
      - ./hapi/application.yaml:/app/config/application.yaml
    environment:
      - SPRING_CONFIG_LOCATION=/app/config/application.yaml
    depends_on:
      - hapi-fhir-postgres

  hapi-fhir-postgres:
    image: postgres:13-alpine
    restart: always
    networks:
      - digitaltwins-platform
    environment:
      POSTGRES_DB: "hapi"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
    volumes:
      - hapi_fhir_postgres:/var/lib/postgresql/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    networks:
      - digitaltwins-platform
    restart: "no"
    environment:
      # Same two .env keys the minio server derives its root credentials from.
      # Hardcoding minioadmin here meant bucket creation broke the moment anyone
      # set real credentials. $$VAR escapes compose interpolation so the value is
      # expanded by the container's shell, not substituted into the entrypoint.
      - MC_USER=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MC_PASS=${MINIO_SERVER_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      until mc alias set myminio http://minio:9000 $$MC_USER $$MC_PASS; do
        sleep 2;
      done;
      echo 'MinIO is up!';
      for BUCKET in measurements models workflows processes; do
        echo \"Creating private bucket '$$BUCKET'...\";
        mc mb myminio/$$BUCKET --ignore-existing;
      done;
      echo 'Creating public bucket tools...';
      mc mb myminio/tools --ignore-existing;
      echo '{\"Version\": \"2012-10-17\", \"Statement\": [{\"Effect\": \"Allow\", \"Principal\": \"*\", \"Action\": [\"s3:GetObject\", \"s3:GetObjectVersion\", \"s3:PutObject\"], \"Resource\": \"arn:aws:s3:::tools/*\"}]}' > /tmp/tools-policy.json;
      mc anonymous set-json /tmp/tools-policy.json myminio/tools;
      echo 'Buckets created and policies applied successfully.';
      "

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}

volumes:
  portal_datasets:
    name: ${PROJECT_NAME}_portal_datasets
    driver: local
  portal_workspace:
    name: ${PROJECT_NAME}_portal_workspace
    driver: local
  hapi_fhir_postgres:
    name: ${PROJECT_NAME}_hapi_fhir_postgres
    driver: local
  plugin_database:
    name: ${PROJECT_NAME}_plugin_database
    driver: local
  minio_data:
    name: ${PROJECT_NAME}_minio_data
    driver: local
  nginx_plugin_configs:
    name: ${PROJECT_NAME}_nginx_plugin_configs
    driver: local